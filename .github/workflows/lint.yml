name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swiftlint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
